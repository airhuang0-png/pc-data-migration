appId: com.pcmigrate.app
productName: PC迁移助手
directories:
  output: release
files:
  - dist/**/*
  - dist-electron/**/*
win:
  target:
    - nsis
    - portable
nsis:
  oneClick: true
  allowToChangeInstallationDirectory: false
extraFiles:
  - from: vcredist/
    to: .
extraResources:
  - from: scripts
    to: scripts
